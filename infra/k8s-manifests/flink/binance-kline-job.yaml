apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: binance-kline-job 
  namespace: airflow
spec:
  image: khongducquang/flink:1.18-custom-v18 # image custome (jar and sql)
  flinkVersion: v1_18
  serviceAccount: flink-operator-sa 
  
  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "2"
    
    #gcs
    google.cloud.auth.service.account.json.key.file: /etc/flink/gcp/gcs-key.json
    fs.gs.project.id: "datn-489915"

    # checkpoint
    execution.checkpointing.interval: "10s"
    execution.checkpointing.mode: "EXACTLY_ONCE"
    execution.checkpointing.min-pause: "5s"
    execution.checkpointing.timeout: "1m"
    execution.checkpointing.max-concurrent-checkpoints: "1"
    execution.checkpointing.externalized-checkpoint-retention: "RETAIN_ON_CANCELLATION"

    # state backend
    state.backend.type: rocksdb
    state.backend.incremental: "true"
    state.backend.rocksdb.memory.managed: "true"
    state.checkpoints.dir: gs://flink-checkpoints-1773848181/checkpoints

    # HA
    high-availability.type: kubernetes
    high-availability.storageDir: gs://flink-checkpoints-1773848181/ha

    # restart
    restart-strategy: failure-rate
    restart-strategy.failure-rate.max-failures-per-interval: "3"
    restart-strategy.failure-rate.failure-rate-interval: "5 min"
    restart-strategy.failure-rate.delay: "10 s"

    # metrics
    metrics.reporters: prom
    metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
    metrics.reporter.prom.port: "9249"
    metrics.reporter.prom.host: "0.0.0.0"

  jobManager:
    resource:
      memory: "1024m"
      cpu: 1

  taskManager:
    resource:
      memory: "1024m"
      cpu: 1

  job:
    jarURI: local:///opt/flink/usrlib/sql-runner.jar 
    entryClass: com.mycompany.flink.SqlRunner
    args: ["/opt/flink/sql/binance_kline_job.sql"]
    parallelism: 2
    upgradeMode: last-state