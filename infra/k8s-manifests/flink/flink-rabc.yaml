apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: airflow
  name: flink-ha-role
rules:
# 1. Quyền tương tác với nhóm API cốt lõi (đã có từ trước)
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "events", "serviceaccounts"] # Thêm serviceaccounts cho chắc
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  
# 2. Quyền tương tác với nhóm API 'apps' (MỚI THÊM)
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

# 3. Quyền cho Leader Election HA (đã có từ trước)
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-ha-role-binding
  namespace: airflow
subjects:
- kind: ServiceAccount
  name: flink-operator-sa
  namespace: airflow
roleRef:
  kind: Role
  name: flink-ha-role
  apiGroup: rbac.authorization.k8s.io