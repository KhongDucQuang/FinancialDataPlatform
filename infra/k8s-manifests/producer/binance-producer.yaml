apiVersion: apps/v1
kind: Deployment
metadata:
  name: binance-producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: binance-producer
  template:
    metadata:
      labels:
        app: binance-producer
    spec:
      containers:
      - name: producer
        image: python:3.9 
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e
            pip install --no-cache-dir python-binance kafka-python
            curl -sSL https://raw.githubusercontent.com/<YOUR_USER>/<YOUR_REPO>/main/src/producers/binance_producer.py -o binance_producer.py
            python -u binance_producer.py
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi" 
        env:
        - name: KAFKA_SERVER
          value: "redpanda:9092"
        - name: PYTHONUNBUFFERED
          value: "1"