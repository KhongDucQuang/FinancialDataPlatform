apiVersion: batch/v1
kind: Job
metadata:
  name: spark-b2s-${PROCESS_DATE_COMPACT}
  namespace: airflow
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never

      nodeSelector:
        kubernetes.io/hostname: data-platform-recover

      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"

      containers:
        - name: spark-bronze-to-silver
          image: khongducquang/spark-iceberg-batch:v2
          imagePullPolicy: Always
          args:
            - "--bucket"
            - "datn-financial-datalake-1773848181"
            - "--process-date"
            - "${PROCESS_DATE}"
            - "--interval"
            - "1m"
            - "--mode"
            - "merge"

          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/google/gcs-key.json

          volumeMounts:
            - name: gcs-key
              mountPath: /var/secrets/google
              readOnly: true

          resources:
            requests:
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"

      volumes:
        - name: gcs-key
          secret:
            secretName: batch-gcs-key